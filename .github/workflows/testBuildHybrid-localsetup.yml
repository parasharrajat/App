name: (Remote) Build hybrid apps for testing # Renamed for clarity for this conversion

on:
  workflow_dispatch:
    inputs:
      REVIEWED_CODE:
        description: I reviewed this pull request and verified that it does not contain any malicious code.
        type: boolean
        required: true
        default: false
      # Pull Request number from App repo for correct placement of ND app. If not specified defaults to main branch.
      APP_PULL_REQUEST_NUMBER:
        description: App PR number. Defaults to main.
        required: false
        default: ''
      # Pull Request number from Mobile-Expensify repo for correct placement of OD app. It will take precedence over MOBILE-EXPENSIFY from App's PR description if both are specified. If nothing is specified defaults to Mobile-Expensify's main
      HYBRIDAPP_PULL_REQUEST_NUMBER:
        description: Mobile-Expensify PR number. Defaults to main. Overrides MOBILE-EXPENSIFY set in App's PR description.
        required: false
        default: ''
      # Do not modify! GH preserves `workflow_dispatch` as the event that triggered this workflow even if it was called from `testBuild.yml`. This is a workaround for that issue.
      DISPATCHED_MANUALLY:
        description: Leave checked! This is a workaround for a GH workflow bug.
        type: boolean
        default: true
  workflow_call:
    inputs:
      APP_PR_NUMBER:
        description: Pull Request number from App repo needed for download link construction
        type: string
        required: true
      APP_REF:
        description: Git ref to checkout in App
        type: string
        required: true
      IOS:
        description: Should build iOS app?
        type: boolean
        default: true
      ANDROID:
        description: Should build Android app?
        type: boolean
        default: true

    outputs:
      ANDROID_LINK:
        value: ${{ jobs.androidHybrid.outputs.ANDROID_ARTIFACT_PATH }}
      IOS_LINK:
        value: ${{ jobs.iosHybrid.outputs.IOS_ARTIFACT_PATH }} # This will now be a link to the GitHub artifact download page

env:
  # This variable is needed for fastlane to construct correct path, -hybrid suffix is needed to distinguish hybrid apps from standalone New Dot
  PULL_REQUEST_NUMBER: ${{ github.event.inputs.APP_PULL_REQUEST_NUMBER || github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER || inputs.APP_PR_NUMBER}}-hybrid

jobs:
  prep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # v4
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Validate input
        if: github.event.inputs.DISPATCHED_MANUALLY
        run: |
          if [[ -z "${{ github.event.inputs.APP_PULL_REQUEST_NUMBER }}" && -z "${{ github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER }}" ]]; then
            echo "Invalid input. You have to pass at least one PR number"
            exit 1
          fi

  getNewDotRef:
    runs-on: ubuntu-latest
    needs: [prep]
    outputs:
      REF: ${{ steps.getHeadRef.outputs.REF }}
    steps:
      - name: Checkout
        # v4
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Check if pull request number is correct
        id: getHeadRef
        run: |
          set -e

          if [[ -n "${{ inputs.APP_REF }}" ]]; then
            echo "REF=${{ inputs.APP_REF }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${{ github.event.inputs.APP_PULL_REQUEST_NUMBER }}" ]]; then
            echo "REF=" >> "$GITHUB_OUTPUT"
          else
            echo "REF=$(gh pr view ${{ github.event.inputs.APP_PULL_REQUEST_NUMBER }} -R Expensify/App --json headRefOid --jq '.headRefOid')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

  getOldDotPR:
    runs-on: ubuntu-latest
    needs: [prep]
    outputs:
      OLD_DOT_PR: ${{ steps.old-dot-pr.outputs.result }}
    steps:
      - name: Check if author specifed Old Dot PR
        id: old-dot-pr
        # v7
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ github.token }}
          result-encoding: string
          script: |
            if ('${{ github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER}}') return '${{ github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER}}';

            if (!'${{ github.event.inputs.APP_PULL_REQUEST_NUMBER }}' && !'${{ inputs.APP_PR_NUMBER }}') return '';

            const pullRequest = await github.rest.pulls.get({
              owner: "Expensify",
              repo: "App",
              pull_number: '${{ github.event.inputs.APP_PULL_REQUEST_NUMBER || inputs.APP_PR_NUMBER }}',
            });

            const body = pullRequest.data.body;
            const regex = /MOBILE-EXPENSIFY:\s*https:\/\/github.com\/Expensify\/Mobile-Expensify\/pull\/(?<prNumber>\d+)/;
            const found = body.match(regex)?.groups?.prNumber || "";

            return found.trim();

  getOldDotRef:
      runs-on: ubuntu-latest
      needs: [getOldDotPR]
      outputs:
        OLD_DOT_REF: ${{ steps.getHeadRef.outputs.REF }}
      steps:
        - name: Checkout
          # v4
          uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

        - name: Check if pull request number is correct
          id: getHeadRef
          run: |
            set -e
            if [[ -z "${{ github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER }}" && -z "${{ needs.getOldDotPR.outputs.OLD_DOT_PR }}" ]]; then
              echo "REF=" >> "$GITHUB_OUTPUT"
            else
              echo "PR=${{ github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER || needs.getOldDotPR.outputs.OLD_DOT_PR }}" >> "$GITHUB_OUTPUT"
              echo "REF=$(gh pr view ${{ github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER || needs.getOldDotPR.outputs.OLD_DOT_PR }} -R Expensify/Mobile-Expensify --json headRefOid --jq '.headRefOid')" >> "$GITHUB_OUTPUT"
            fi
          env:
            GITHUB_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}

  postSlackCommentBuildStarted:
    name: Post build started comment
    needs: [prep]
    runs-on: ubuntu-latest
    steps:
      - name: Post on Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_BUILDS }}
          webhook-type: incoming-webhook
          payload: |
            text: "Build job started for PR: ${{ github.event.inputs.APP_PULL_REQUEST_NUMBER || github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER }}
            Platforms: ${{ ((github.event.inputs.IOS || github.event.inputs.APP_PULL_REQUEST_NUMBER) && 'iOS') || '' }} ${{ ((github.event.inputs.ANDROID || github.event.inputs.APP_PULL_REQUEST_NUMBER) && 'Android') || '' }}"

  androidHybrid:
    name: Build Android HybridApp (Debug)
    if: ${{ github.event.inputs.DISPATCHED_MANUALLY || inputs.ANDROID }}
    needs: [getNewDotRef, getOldDotPR, getOldDotRef]
    runs-on: ubuntu-latest
    outputs:
      ANDROID_ARTIFACT_PATH: ${{ steps.export-android-path.outputs.ANDROID_ARTIFACT_PATH }}
    steps:
      # - name: Checkout
      #   # v4
      #   uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
      #   with:
      #     submodules: true
      #     ref: ${{ needs.getNewDotRef.outputs.REF || 'main' }}
      #     token: ${{ secrets.OS_BOTIFY_TOKEN }}
      - name: Checkout to PR
        env:
          GH_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}
        run: |
          gh pr checkout ${{ needs.getNewDotRef.outputs.REF || 'main' }} -R Expensify/App --recurse-submodules -f

      - name: Checkout Old Dot to author specified branch or commit
        if: ${{ needs.getOldDotRef.outputs.OLD_DOT_REF != '' }}
        run: |
          cd Mobile-Expensify
          git fetch origin ${{ needs.getOldDotRef.outputs.OLD_DOT_REF }}
          git checkout ${{ needs.getOldDotRef.outputs.OLD_DOT_REF }}
          echo "Building from https://github.com/Expensify/Mobile-Expensify/pull/${{ needs.getOldDotPR.outputs.OLD_DOT_PR }}"

      - name: Download Diff from Gist and Apply Patch
        env:
          # Define the raw URL of your diff file in the Gist
          GIST_DIFF_URL: ${{ secrets.GIST_DIFF_URL }}
          DIFF_FILENAME: "Main.diff"
          TEMP_DIFF_FILE: "patch.diff"
          GH_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}

        run: |
          echo "Using gh cli to download '$DIFF_FILENAME' from Gist ID: $GIST_ID"

          # 1. Download the raw content of the specific file from the Gist using gh cli
          # --filename: Specifies the file within the Gist
          # --raw: Outputs the raw content of the file

          gh gist view --filename "$DIFF_FILENAME" --raw "$GIST_ID" > "$TEMP_DIFF_FILE"

          # Check if the gh command was successful and the file is not empty
          if [ $? -ne 0 ] || [ ! -s "$TEMP_DIFF_FILE" ]; then
            echo "::error::Failed to download diff file from Gist via gh cli. Check GIST_ID, DIFF_FILENAME, and Gist permissions."
            exit 1
          fi

          echo "Diff file downloaded to $TEMP_DIFF_FILE. Applying patch..."

          # 2. Apply the downloaded diff as a patch
          # --check: Optional, run a dry run first to see if the patch can be applied cleanly without actually modifying files.
          # -p1: Tells git apply to strip one leading directory component from file paths in the patch.
          #      This is common for patches generated by `git diff` which include `a/` and `b/` prefixes.

          git apply --check "$TEMP_DIFF_FILE"

          if [ $? -ne 0 ]; then
            echo "::error::Patch cannot be applied cleanly. Conflicts detected or invalid patch format."
            echo "Attempting to apply patch to show conflicts in working directory:"
            # Apply without --check to leave conflict markers in the working directory
            git apply "$TEMP_DIFF_FILE" || true # `|| true` prevents script from exiting on conflict
            exit 1
          fi

          echo "Patch can be applied cleanly. Applying now..."
          git apply "$TEMP_DIFF_FILE"

          echo "Patch applied successfully!"
          # Clean up the temporary diff file
          rm "$TEMP_DIFF_FILE"

      - name: Verify Applied Changes (Optional)
        run: |
          echo "Current git status after patch:"
          git status
          echo "Changes in working directory after patch:"
          git diff HEAD

      - name: Configure MapBox SDK
        run: ./scripts/setup-mapbox-sdk.sh ${{ secrets.MAPBOX_SDK_DOWNLOAD_TOKEN }}

      - name: Setup Node
        id: setup-node
        uses: ./.github/actions/composite/setupNode
        with:
          IS_HYBRID_BUILD: 'true'

      - name: Run grunt build
        run: |
            cd Mobile-Expensify
            npm run grunt:build:shared

      - name: Setup dotenv
        run: |
            touch .env
            echo "PULL_REQUEST_NUMBER=${{ github.event.inputs.APP_PULL_REQUEST_NUMBER }}" >> .env

      - name: Setup Java
        # v4
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Ruby
        # v1.229.0
        uses: ruby/setup-ruby@354a1ad156761f5ee2b7b13fa8e09943a5e8d252
        with:
          bundler-cache: true

      # For Debug builds, these 1Password steps and keystores are generally not needed.
      # You can remove or comment them out if you're only building for local debug testing.
      # However, if your Fastlane setup (or React Native Android setup) *still* expects them
      # even for debug, you might need to keep minimal versions or adjust your Fastfile.
      # I'm commenting them out for a clean debug build scenario.
      # - name: Install 1Password CLI
      #   uses: 1password/install-cli-action@v1

      # - name: Load files from 1Password
      #   env:
      #     OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      #   run: |
      #     op read "op://${{ vars.OP_VAULT }}/upload-key.keystore/upload-key.keystore" --force --out-file ./upload-key.keystore
      #     op read "op://${{ vars.OP_VAULT }}/android-fastlane-json-key.json/android-fastlane-json-key.json" --force --out-file ./android-fastlane-json-key.json
      #     cp ./upload-key.keystore Mobile-Expensify/Android

      # - name: Load Android upload keystore credentials from 1Password
      #   id: load-credentials
      #   uses: 1password/load-secrets-action@v2
      #   with:
      #     export-env: false
      #   env:
      #     OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      #     ANDROID_UPLOAD_KEYSTORE_PASSWORD: op://${{ vars.OP_VAULT }}/Repository-Secrets/ANDROID_UPLOAD_KEYSTORE_PASSWORD
      #     ANDROID_UPLOAD_KEYSTORE_ALIAS: op://${{ vars.OP_VAULT }}/Repository-Secrets/ANDROID_UPLOAD_KEYSTORE_ALIAS
      #     ANDROID_UPLOAD_KEY_PASSWORD: op://${{ vars.OP_VAULT }}/Repository-Secrets/ANDROID_UPLOAD_KEY_PASSWORD

      - name: Build Android app
        id: build
        run: |
          ./scripts/set-pusher-suffix.sh
          ./scripts/run-build.sh --android-apk
          ./scripts/run-build.sh --export-sh

          # Locate and Upload Android Debug APK
          APK_PATH=$(find ./Mobile-Expensify/Android/build/outputs/apk/debug -name "*.apk" -maxdepth 1 | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "::error::.apk bundle not found!"
            exit 1
          fi
          echo "Found .apk at: $APK_PATH"
          echo "ANDROID_APK_PATH=$APK_PATH" >> "$GITHUB_OUTPUT"

      # Removed AWS and S3 upload steps as they are for distribution, not local debug
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: us-east-1

      # - name: Upload Android AdHoc build to S3
      #   run: bundle exec fastlane android upload_s3
      #   env:
      #     S3_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     S3_BUCKET: ad-hoc-expensify-cash
      #     S3_REGION: us-east-1

      # - name: Export S3 path
      #   id: exportAndroidS3Path
      #   run: |
      #     # This path logic will need to be adjusted to find the debug APK locally on the runner
      #     # Example: Find the .apk file and set its path
      #     APK_PATH=$(find ./android/app/build/outputs/apk/debug -name "*.apk" -maxdepth 1 | head -n 1)
      #     echo "S3_APK_PATH=$APK_PATH" >> "$GITHUB_OUTPUT" # Naming kept for compatibility with outputs

      # Add step to upload Android Debug APK as an artifact

      - name: Upload Android Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-Debug-APK
          path: ${{ steps.build.outputs.ANDROID_APK_PATH }}
          retention-days: 3 # Optional: how long to keep the artifact

      - name: Set Android Output Path to Artifact URL
        id: export-android-path
        run: |
          # Construct a placeholder URL for the artifact
          # Actual download URL is only available after the run
          echo "ANDROID_ARTIFACT_PATH=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/Android-Debug-APK" >> "$GITHUB_OUTPUT"


  iosHybrid:
    name: Build iOS HybridApp (Debug for Simulator)
    if: ${{ github.event.inputs.DISPATCHED_MANUALLY || inputs.IOS }}
    needs: [getNewDotRef, getOldDotPR, getOldDotRef]
    # DEVELOPER_DIR is usually not needed for simulator builds, but keep if you're sure about your Xcode path
    # env:
    #   DEVELOPER_DIR: /Applications/Xcode_16.2.0.app/Contents/Developer
    runs-on: macos-latest
    outputs:
      IOS_ARTIFACT_PATH: ${{ steps.export-ios-path.outputs.IOS_ARTIFACT_PATH }} # This will point to the artifact name
    steps:
      # - name: Checkout
      #   # v4
      #   uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
      #   with:
      #     submodules: true
      #     ref: ${{ needs.getNewDotRef.outputs.REF || 'main' }}
      #     token: ${{ secrets.OS_BOTIFY_TOKEN }}
      - name: Checkout to PR
        env:
          GH_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}
        run: |
          gh pr checkout ${{ needs.getNewDotRef.outputs.REF || 'main' }} -R Expensify/App --recurse-submodules -f

      - name: Checkout Old Dot to author specified branch or commit
        if: ${{ needs.getOldDotRef.outputs.OLD_DOT_REF != '' }}
        run: |
          cd Mobile-Expensify
          git fetch origin ${{ needs.getOldDotRef.outputs.OLD_DOT_REF }}
          git checkout ${{ needs.getOldDotRef.outputs.OLD_DOT_REF }}
          echo "Building from https://github.com/Expensify/Mobile-Expensify/pull/${{ needs.getOldDotPR.outputs.OLD_DOT_PR }}"

      - name: Download Diff from Gist and Apply Patch
        env:
          # Define the raw URL of your diff file in the Gist
          GIST_DIFF_URL: ${{ secrets.GIST_DIFF_URL }}
          DIFF_FILENAME: "Main.diff"
          TEMP_DIFF_FILE: "patch.diff"
          GH_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}

        run: |
          echo "Using gh cli to download '$DIFF_FILENAME' from Gist ID: $GIST_ID"

          # 1. Download the raw content of the specific file from the Gist using gh cli
          # --filename: Specifies the file within the Gist
          # --raw: Outputs the raw content of the file

          gh gist view --filename "$DIFF_FILENAME" --raw "$GIST_ID" > "$TEMP_DIFF_FILE"

          # Check if the gh command was successful and the file is not empty
          if [ $? -ne 0 ] || [ ! -s "$TEMP_DIFF_FILE" ]; then
            echo "::error::Failed to download diff file from Gist via gh cli. Check GIST_ID, DIFF_FILENAME, and Gist permissions."
            exit 1
          fi

          echo "Diff file downloaded to $TEMP_DIFF_FILE. Applying patch..."

          # 2. Apply the downloaded diff as a patch
          # --check: Optional, run a dry run first to see if the patch can be applied cleanly without actually modifying files.
          # -p1: Tells git apply to strip one leading directory component from file paths in the patch.
          #      This is common for patches generated by `git diff` which include `a/` and `b/` prefixes.

          git apply --check "$TEMP_DIFF_FILE"

          if [ $? -ne 0 ]; then
            echo "::error::Patch cannot be applied cleanly. Conflicts detected or invalid patch format."
            echo "Attempting to apply patch to show conflicts in working directory:"
            # Apply without --check to leave conflict markers in the working directory
            git apply "$TEMP_DIFF_FILE" || true # `|| true` prevents script from exiting on conflict
            exit 1
          fi

          echo "Patch can be applied cleanly. Applying now..."
          git apply "$TEMP_DIFF_FILE"

          echo "Patch applied successfully!"
          # Clean up the temporary diff file
          rm "$TEMP_DIFF_FILE"

      - name: Verify Applied Changes (Optional)
        run: |
          echo "Current git status after patch:"
          git status
          echo "Changes in working directory after patch:"
          git diff HEAD

      - name: Configure MapBox SDK
        run: ./scripts/setup-mapbox-sdk.sh ${{ secrets.MAPBOX_SDK_DOWNLOAD_TOKEN }}

      - name: Setup Node
        id: setup-node
        uses: ./.github/actions/composite/setupNode
        with:
          IS_HYBRID_BUILD: 'true'

      - name: Create .env file based on staging and add PULL_REQUEST_NUMBER env to it
        run: |
          # Changed to .env for Debug builds
          touch .env
          echo "PULL_REQUEST_NUMBER=${{ github.event.inputs.APP_PULL_REQUEST_NUMBER }}" >> .env

      - name: Setup Ruby
        # v1.229.0
        uses: ruby/setup-ruby@354a1ad156761f5ee2b7b13fa8e09943a5e8d252
        with:
          bundler-cache: true

      - name: Install New Expensify Gems
        run: bundle install

      - name: Cache Pod dependencies
        # v4
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57
        id: pods-cache
        with:
          path: Mobile-Expensify/iOS/Pods
          key: ${{ runner.os }}-pods-cache-${{ hashFiles('Mobile-Expensify/iOS/Podfile.lock', 'firebase.json') }}

      - name: Compare Podfile.lock and Manifest.lock
        id: compare-podfile-and-manifest
        run: echo "IS_PODFILE_SAME_AS_MANIFEST=${{ hashFiles('Mobile-Expensify/iOS/Podfile.lock') == hashFiles('Mobile-Expensify/iOS/Manifest.lock') }}" >> "$GITHUB_OUTPUT"

      - name: Install cocoapods
        uses: nick-fields/retry@3f757583fb1b1f940bc8ef4bf4734c8dc02a5847
        if: steps.pods-cache.outputs.cache-hit != 'true' || steps.compare-podfile-and-manifest.outputs.IS_PODFILE_SAME_AS_MANIFEST != 'true' || steps.setup-node.outputs.cache-hit != 'true'
        with:
          timeout_minutes: 15
          max_attempts: 5
          command: npm run pod-install

      # REMOVED all 1Password, certificate, and provisioning profile steps
      # as they are not needed for simulator debug builds.
      # - name: Install 1Password CLI
      #   uses: 1password/install-cli-action@v1

      # - name: Load files from 1Password
      #   env:
      #     OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      #   run: |
      #     op read "op://${{ vars.OP_VAULT }}/OldApp_AdHoc/OldApp_AdHoc.mobileprovision" --force --out-file ./OldApp_AdHoc.mobileprovision
      #     op read "op://${{ vars.OP_VAULT }}/OldApp_AdHoc_Share_Extension/OldApp_AdHoc_Share_Extension.mobileprovision" --force --out-file ./OldApp_AdHoc_Share_Extension.mobileprovision
      #     op read "op://${{ vars.OP_VAULT }}/OldApp_AdHoc_Notification_Service/OldApp_AdHoc_Notification_Service.mobileprovision" --force --out-file ./OldApp_AdHoc_Notification_Service.mobileprovision
      #     op read "op://${{ vars.OP_VAULT }}/New Expensify Distribution Certificate/Certificates.p12" --force --out-file ./Certificates.p12

      - name: Build iOS App for Simulator (Debug)
        id: build-simulator
        run: |
          ./scripts/set-pusher-suffix.sh
          ./scripts/run-build.sh --ios-ipa
          ./scripts/run-build.sh --export-sh

          # Find the .app bundle. This path can vary based on project structure.
          # Adjust the path if your build creates it elsewhere relative to Mobile-Expensify/iOS
          BUILD_SETTINGS=$(xcodebuild -workspace Expensify.xcworkspace -scheme "$SCHEME" -sdk iphonesimulator -configuration $IOS_MODE -showBuildSettings -json)
          APP_PATH=$(echo "$BUILD_SETTINGS" | jq -r '.buildSettings.CODESIGNING_FOLDER_PATH')

          if [ -z "$APP_PATH" ]; then
            echo "::error::.app bundle not found in build path!"
            exit 1
          fi
          echo "Found .app bundle at: $APP_PATH"
          echo "APP_BUNDLE_PATH=$APP_PATH" >> "$GITHUB_OUTPUT"

      # - name: Zip Simulator .app Bundle
      #   id: zip-simulator-app
      #   run: |
      #     APP_BUNDLE_PATH="${{ steps.build-simulator.outputs.APP_BUNDLE_PATH }}"
      #     APP_NAME=$(basename "$APP_BUNDLE_PATH")
      #     ZIP_FILE_NAME="${APP_NAME}.zip"
      #     cd $(dirname "$APP_BUNDLE_PATH") # Change to parent directory of the .app bundle
      #     zip -r "$ZIP_FILE_NAME" "$APP_NAME"
      #     echo "SIMULATOR_APP_ZIP_PATH=$(pwd)/$ZIP_FILE_NAME" >> "$GITHUB_OUTPUT"


      # Removed AWS and S3 upload steps as they are for distribution, not local debug
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: us-east-1

      # - name: Upload AdHoc build to S3
      #   run: bundle exec fastlane ios upload_s3
      #   env:
      #     S3_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     S3_BUCKET: ad-hoc-expensify-cash
      #     S3_REGION: us-east-1

      - name: Upload iOS Simulator App as Artifact
        id: upload-simulator-app
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Debug-Simulator-App
          path: ${{ steps.build-simulator.outputs.APP_BUNDLE_PATH }}
          retention-days: 3 # Optional: how long to keep the artifact

      - name: Set iOS Output Path to Artifact URL
        id: export-ios-path
        run: |
          # Construct a placeholder URL for the artifact
          # Actual download URL is only available after the run
          echo "IOS_ARTIFACT_PATH=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/iOS-Debug-Simulator-App" >> "$GITHUB_OUTPUT"


  postSlackCommentBuildCompleted:
    runs-on: ubuntu-latest
    name: Post a GitHub comment and save links as artifact
    needs: [androidHybrid, iosHybrid]
    steps:
      - name: Create JSON file with build links
        run: |
          echo '{
            "android": "${{ needs.androidHybrid.outputs.ANDROID_ARTIFACT_PATH }}",
            "ios": "${{ needs.iosHybrid.outputs.IOS_ARTIFACT_PATH }}"
          }' > build-links.json

      - name: Upload build links as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-links
          path: build-links.json
          retention-days: 7

      - name: Post on Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_BUILDS }}
          webhook-type: incoming-webhook
          payload: |
            text: "Build job completed for PR: ${{ github.event.inputs.APP_PULL_REQUEST_NUMBER || github.event.inputs.HYBRIDAPP_PULL_REQUEST_NUMBER }}\nAndroid: ${{ needs.androidHybrid.outputs.ANDROID_ARTIFACT_PATH }}\niOS: ${{ needs.iosHybrid.outputs.IOS_ARTIFACT_PATH }}"
